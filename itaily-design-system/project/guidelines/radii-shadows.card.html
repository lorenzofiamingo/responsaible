<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & Shadows" subtitle="Corner radii and the warm-tinted shadow scale." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px;display:flex;flex-direction:column;gap:22px;box-sizing:border-box}
  .row{display:flex;gap:18px;align-items:center}
  .box{width:64px;height:54px;background:var(--surface-card);display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
  .rad{border:var(--border-width) solid var(--border-strong)}
</style></head>
<body>
  <div class="row">
    <div class="box rad" style="border-radius:var(--radius-xs)"><span class="lab">xs</span></div>
    <div class="box rad" style="border-radius:var(--radius-sm)"><span class="lab">sm</span></div>
    <div class="box rad" style="border-radius:var(--radius-md)"><span class="lab">md</span></div>
    <div class="box rad" style="border-radius:var(--radius-lg)"><span class="lab">lg</span></div>
    <div class="box rad" style="border-radius:var(--radius-xl)"><span class="lab">xl</span></div>
    <div class="box rad" style="border-radius:var(--radius-pill);width:90px"><span class="lab">pill</span></div>
  </div>
  <div class="row">
    <div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-xs)"><span class="lab">xs</span></div>
    <div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-sm)"><span class="lab">sm</span></div>
    <div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md)"><span class="lab">md</span></div>
    <div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-lg)"><span class="lab">lg</span></div>
  </div>
</body></html>
