<!-- @dsCard group="Type" viewport="700x200" name="Serif & Mono" subtitle="Newsreader for legal excerpts · Space Mono for citations." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:24px;color:var(--text-primary);display:flex;flex-direction:column;gap:16px}
  .quote{font-family:var(--font-serif);font-size:var(--text-lg);line-height:var(--leading-relaxed);font-style:italic;color:var(--neutral-700);border-left:3px solid var(--color-accent);padding-left:16px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
  .cites{display:flex;gap:10px;flex-wrap:wrap}
  .cite{font-family:var(--font-mono);font-size:13px;background:var(--terracotta-50);color:var(--terracotta-700);padding:4px 10px;border-radius:var(--radius-sm)}
</style></head>
<body>
  <div>
    <div class="meta">Newsreader · serif · legal excerpt</div>
    <p class="quote">«Qualunque fatto doloso o colposo che cagiona ad altri un danno ingiusto…»</p>
  </div>
  <div>
    <div class="meta" style="margin-bottom:8px">Space Mono · citation references</div>
    <div class="cites"><span class="cite">Art. 2043 c.c.</span><span class="cite">D.Lgs. 196/2003</span><span class="cite">Cass. civ. 12477/2019</span></div>
  </div>
</body></html>
