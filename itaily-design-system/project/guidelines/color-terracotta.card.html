<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Terracotta" subtitle="The accent. From the [ai] in the wordmark." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;height:150px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .sw span{font-family:var(--font-mono);font-size:11px}
  .lite{color:var(--neutral-800)} .dark{color:#fff}
</style></head>
<body>
  <div class="row">
    <div class="sw lite" style="background:var(--terracotta-50)"><span>50</span></div>
    <div class="sw lite" style="background:var(--terracotta-100)"><span>100</span></div>
    <div class="sw lite" style="background:var(--terracotta-200)"><span>200</span></div>
    <div class="sw lite" style="background:var(--terracotta-300)"><span>300</span></div>
    <div class="sw dark" style="background:var(--terracotta-400)"><span>400</span></div>
    <div class="sw dark" style="background:var(--terracotta-500);outline:2px solid var(--neutral-800);outline-offset:-2px"><span>500 ●</span></div>
    <div class="sw dark" style="background:var(--terracotta-600)"><span>600</span></div>
    <div class="sw dark" style="background:var(--terracotta-700)"><span>700</span></div>
    <div class="sw dark" style="background:var(--terracotta-800)"><span>800</span></div>
    <div class="sw dark" style="background:var(--terracotta-900)"><span>900</span></div>
  </div>
</body></html>
