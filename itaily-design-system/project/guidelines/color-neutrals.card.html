<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals — Ink" subtitle="Paper to near-black. 700 is the logo gray." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans)}
  .row{display:flex;height:150px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .sw span{font-family:var(--font-mono);font-size:11px}
  .lite{color:var(--neutral-800)} .dark{color:#fff}
</style></head>
<body>
  <div class="row">
    <div class="sw lite" style="background:var(--paper);box-shadow:inset 0 0 0 1px var(--neutral-200)"><span>paper</span></div>
    <div class="sw lite" style="background:var(--neutral-50)"><span>50</span></div>
    <div class="sw lite" style="background:var(--neutral-100)"><span>100</span></div>
    <div class="sw lite" style="background:var(--neutral-200)"><span>200</span></div>
    <div class="sw lite" style="background:var(--neutral-300)"><span>300</span></div>
    <div class="sw lite" style="background:var(--neutral-400)"><span>400</span></div>
    <div class="sw dark" style="background:var(--neutral-500)"><span>500</span></div>
    <div class="sw dark" style="background:var(--neutral-600)"><span>600</span></div>
    <div class="sw dark" style="background:var(--neutral-700)"><span>700</span></div>
    <div class="sw dark" style="background:var(--neutral-800)"><span>800</span></div>
    <div class="sw dark" style="background:var(--neutral-900)"><span>900</span></div>
  </div>
</body></html>
