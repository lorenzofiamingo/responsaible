<!-- @dsCard group="Type" viewport="700x260" name="Display — Space Grotesk" subtitle="Brand & headings. Tight tracking, semibold." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-display);padding:24px;color:var(--text-primary)}
  .line{display:flex;align-items:baseline;gap:16px;padding:6px 0;border-bottom:1px solid var(--border-subtle)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);width:120px;flex:none}
  .d1{font-size:var(--text-3xl);font-weight:600;letter-spacing:var(--tracking-tight)}
  .d2{font-size:var(--text-2xl);font-weight:600;letter-spacing:var(--tracking-tight)}
  .d3{font-size:var(--text-xl);font-weight:500;letter-spacing:var(--tracking-snug)}
</style></head>
<body>
  <div class="line"><div class="meta">3xl · 48 · 600</div><div class="d1">Italian law, decoded</div></div>
  <div class="line"><div class="meta">2xl · 36 · 600</div><div class="d2">Ask. Cite. Comply.</div></div>
  <div class="line" style="border:0"><div class="meta">xl · 28 · 500</div><div class="d3">Grounded in the Codice Civile</div></div>
</body></html>
