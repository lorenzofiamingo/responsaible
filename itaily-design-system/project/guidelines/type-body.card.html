<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:24px;color:var(--text-primary)}
  .grp{display:flex;gap:16px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border-subtle)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);width:120px;flex:none}
  .md{font-size:var(--text-md)} .base{font-size:var(--text-base)} .sm{font-size:var(--text-sm);color:var(--text-secondary)}
  b{font-weight:600}
</style></head>
<body>
  <div class="grp"><div class="meta">md · 18</div><div class="md">Itaily reads your question and finds the governing articles.</div></div>
  <div class="grp"><div class="meta">base · 16</div><div class="base">Every answer is <b>grounded</b> in primary sources, with inline citations you can verify in one click.</div></div>
  <div class="grp" style="border:0"><div class="meta">sm · 14</div><div class="sm">Last updated 14 Mar 2025 · Gazzetta Ufficiale</div></div>
</body></html>
