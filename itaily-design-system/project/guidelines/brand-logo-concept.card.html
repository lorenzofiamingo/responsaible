<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:28px;display:flex;align-items:center;gap:36px;height:200px;box-sizing:border-box}
  .logo{width:300px;flex:none}
  .note p{margin:0 0 8px}
  .k{font-family:var(--font-mono);font-size:12px;color:var(--terracotta-700);background:var(--terracotta-50);padding:2px 7px;border-radius:var(--radius-sm)}
  .lead{font-size:var(--text-md);color:var(--text-primary);line-height:var(--leading-snug)}
  .sub{font-size:var(--text-sm);color:var(--text-secondary)}
</style></head>
<body>
  <img class="logo" src="../assets/logo/itaily-logo.svg" alt="Itaily">
  <div class="note">
    <p class="lead">The wordmark reads <span class="k">it</span> <span class="k">[ai]</span> <span class="k">ly</span>.</p>
    <p class="sub">AI sits — bracketed and terracotta — inside the word Italy. The brackets nod to code and to legal citation. Built from Space&nbsp;Grotesk, with custom-tuned vectors.</p>
  </div>
</body></html>
