<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Success, caution, risk, info — muted & warm." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:20px;display:flex;gap:14px;align-items:center;height:150px;box-sizing:border-box}
  .chip{flex:1;border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;gap:8px}
  .dot{width:22px;height:22px;border-radius:50%}
  .lab{font-weight:600;font-size:14px;color:var(--neutral-800)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--neutral-600)}
</style></head>
<body>
  <div class="chip" style="background:var(--status-success-bg)"><div class="dot" style="background:var(--status-success-fg)"></div><div class="lab">Success</div><div class="hex">--green-500</div></div>
  <div class="chip" style="background:var(--status-warning-bg)"><div class="dot" style="background:var(--status-warning-fg)"></div><div class="lab">Caution</div><div class="hex">--amber-500</div></div>
  <div class="chip" style="background:var(--status-danger-bg)"><div class="dot" style="background:var(--status-danger-fg)"></div><div class="lab">Risk</div><div class="hex">--red-500</div></div>
  <div class="chip" style="background:var(--status-info-bg)"><div class="dot" style="background:var(--status-info-fg)"></div><div class="lab">Info</div><div class="hex">--blue-500</div></div>
</body></html>
