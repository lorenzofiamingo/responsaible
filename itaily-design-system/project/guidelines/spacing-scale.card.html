<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base, --space-1 → --space-9." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);padding:20px;display:flex;gap:18px;align-items:flex-end;height:150px;box-sizing:border-box}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--color-accent);width:26px;border-radius:var(--radius-xs)}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><div class="lab">1·4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="lab">2·8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="lab">3·12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="lab">4·16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="lab">5·24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="lab">6·32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="lab">7·48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="lab">8·64</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="lab">9·96</div></div>
</body></html>
