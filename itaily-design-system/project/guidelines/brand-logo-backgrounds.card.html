<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);display:grid;grid-template-columns:repeat(4,1fr);height:180px}
  .cell{display:flex;align-items:center;justify-content:center;padding:24px}
  .cell img{width:150px}
  .cell.mark img{width:64px}
</style></head>
<body>
  <div class="cell" style="background:var(--surface-page)"><img src="../assets/logo/itaily-logo.svg"></div>
  <div class="cell" style="background:var(--surface-inverse)"><img src="../assets/logo/itaily-logo-light.svg"></div>
  <div class="cell" style="background:var(--color-accent)"><img src="../assets/logo/itaily-logo-ink.svg"></div>
  <div class="cell mark" style="background:var(--neutral-100)"><div style="background:#fff;width:96px;height:96px;border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md)"><img src="../assets/logo/itaily-mark.svg" style="width:60px"></div></div>
</body></html>
