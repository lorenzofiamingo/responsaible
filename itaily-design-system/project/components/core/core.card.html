<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px}
  .grid{display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);width:100%}
</style></head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge, Card, Avatar, Icon } = window.ItailyDesignSystem_88d7b8;
  function Demo(){
    return (
      <div className="grid">
        <div className="row"><span className="lbl">Buttons</span>
          <Button variant="primary" iconLeft={<Icon name="sparkles" size={18}/>}>Ask Itaily</Button>
          <Button variant="secondary" iconLeft={<Icon name="file-text" size={18}/>}>View source</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row"><span className="lbl">Icon buttons · Avatars</span>
          <IconButton icon="copy" label="Copy" variant="outline"/>
          <IconButton icon="thumbs-up" label="Good" />
          <IconButton icon="send" label="Send" variant="solid"/>
          <span style={{width:12}}></span>
          <Avatar name="Giulia Romano"/>
          <Avatar name="Marco Bianchi" tone="neutral"/>
          <Avatar name="Itaily" tone="ink"/>
        </div>
        <div className="row"><span className="lbl">Badges</span>
          <Badge tone="success">Compliant</Badge>
          <Badge tone="warning">Needs review</Badge>
          <Badge tone="danger" variant="solid">Risk</Badge>
          <Badge tone="accent" variant="outline">GDPR</Badge>
          <Badge tone="info">Reference</Badge>
          <Badge tone="neutral">Draft</Badge>
        </div>
        <div className="row"><span className="lbl">Cards</span>
          <Card elevation="sm" style={{width:200}}>
            <div style={{fontFamily:'var(--font-display)',fontWeight:600,marginBottom:4}}>Codice Civile</div>
            <div style={{fontSize:14,color:'var(--text-secondary)'}}>2,969 articles indexed</div>
          </Card>
          <Card elevation="md" interactive style={{width:200}}>
            <div style={{fontFamily:'var(--font-display)',fontWeight:600,marginBottom:4}}>Interactive →</div>
            <div style={{fontSize:14,color:'var(--text-secondary)'}}>Hover to lift</div>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide&&window.lucide.createIcons(),300);
</script>
</body></html>
